version: 2

project_name: guyide

before:
  hooks:
    - go mod tidy

builds:
  - id: guyide
    main: ./cmd/guyide
    binary: guyide
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/guysoft/guyide-cli/internal/version.Version={{ .Version }}
      - -X github.com/guysoft/guyide-cli/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/guysoft/guyide-cli/internal/version.BuildDate={{ .Date }}

# Emit raw binaries (no tar.gz). README's curl command expects this layout:
#   guyide-<os>-<arch>   e.g. guyide-linux-x86_64 / guyide-darwin-arm64
archives:
  - id: raw
    formats: [binary]
    name_template: >-
      {{ .ProjectName }}-
      {{- if eq .Os "darwin" }}darwin
      {{- else if eq .Os "linux" }}linux
      {{- else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
