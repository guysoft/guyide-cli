# guyide:managed v1
# guyide.conf — canonical tmux configuration shipped by guyide.
#
# This file is owned by guyide. It is materialised at
# ~/.guyide/components/tmux/guyide.conf and ~/.tmux.conf is replaced
# with a copy whose first line is the marker above. Drift is detected
# by comparing the marker + sha256 stored in the manifest.
#
# To customise: edit ~/.guyide/config.yaml and add a tmux extras file,
# or `guyide config tmux own_conf=false` to opt out of ownership.

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config with prefix-r.
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux conf reloaded"

# vim-style mode keys + pane navigation.
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g mouse on

# Clipboard.
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Pane creation keeps current working directory.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar position.
set -g status-position top

# === Plugins (TPM) ===
# guyide installs TPM into ~/.tmux/plugins/tpm and prefix-I picks them up.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'guysoft/tmux-resurrect-opencode-sessions'
set -g @plugin 'guysoft/tmux-ide'

# Session restore (continuum auto-saves every 15 min).
set -g @continuum-restore 'on'
set -g @resurrect-processes '~opencode'

# Theme: Oasis (lagoon).
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "lagoon"

# Initialise TPM (must be last line).
run '~/.tmux/plugins/tpm/tpm'
